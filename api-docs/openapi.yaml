openapi: 3.1.0
info:
  title: Cortes API
  description: |
    Cortes API serves two platforms from a single Go codebase: the App platform for mobile clients and the Intools platform for internal staff tools.

    ## API Summary

    | Platform | Prefix | Audience | Description |
    |---|---|---|---|
    | **App** | `/api` | Mobile clients | Customer-facing endpoints for auth, loans, payments, wallet, gold, points, and PPOB |
    | **Intools** | `/intools` | Internal staff | Back-office tools for loan management, customers, cash, inventory, and reporting |
    | **Internal** | `/internal` | Internal services | Service-to-service endpoints |
    | **Landing** | `/landing` | Public website | Public endpoints for branches, banners, promos, and appointments |
    | **Webhook** | `/webhook` | Third-party providers | Incoming webhooks from payment providers and PPOB |

    ## Authentication

    | Type | Used By | How |
    |---|---|---|
    | JWT Bearer token | App, Intools | `Authorization: Bearer <token>` header |
    | Refresh token | App, Intools | POST to `/api/v1/auth/refresh` |
    | Public (no auth) | Landing, some Webhooks | No header required |
    | PIN login | App | POST to `/api/v1/auth/pin/login` |
    | OTP | App | Request via `/api/v1/auth/otp/request` |

    ## Domains

    | Domain | Platforms | Description |
    |---|---|---|
    | **Auth** | App, Intools | Login, OTP, PIN, refresh tokens |
    | **Loan** | App, Intools | Loan lifecycle, payments, calculations |
    | **Payment** | App, Intools | Payment links, verification, webhooks |
    | **Wallet** | App | Withdraw, transactions, account inquiry |
    | **Gold** | App, Intools | Gold rewards, redemptions, prices |
    | **Point** | App, Intools | Point rewards, redemptions, transactions |
    | **PPOB** | App | Electricity, mobile prepaid, PDAM bills |
    | **Customer** | App, Intools | Customer state, prospects, verification |
    | **Branch** | App, Intools, Landing | Branch listing and details |
    | **Banner** | App, Intools, Landing | Banner management |
    | **Pricing Engine** | App, Intools | Loan pricing calculations |
    | **Webhook** | External | DOKU, Xendit, OY, Alterra, Pintarnya |

    ## Environments

    | Environment | Description |
    |---|---|
    | `local` | Local development |
    | `staging` | Testing and QA |
    | `production` | Live app traffic |
    | `internal-production` | Internal tools on production data |

    ## Response Format

    All endpoints return JSON. Successful responses follow this general shape:

    ## Response Envelope

    Every endpoint returns a consistent JSON envelope:

    | Field | Type | Description |
    |---|---|---|
    | `header.server_time_ms` | `integer` | Unix timestamp (ms) when the server processed the request |
    | `header.process_time_ms` | `integer` | Time taken (ms) to process the request |
    | `header.request_id` | `string` | Unique UUID for tracing/debugging this request |

    ```json
    {
      "header": {
        "server_time_ms": 1741535480,
        "process_time_ms": 5064,
        "request_id": "8ceb138a-375a-4118-9d47-035e824d6597"
      },
      "data": { ... }
    }
    ```

    ## Architecture

    | Layer | Description |
    |---|---|
    | Controller | Handles HTTP routing and request/response |
    | Service | Business logic |
    | Repository | Database and external service calls |
    | Shared modules | Common domain logic across platforms |
  version: 0.0.1

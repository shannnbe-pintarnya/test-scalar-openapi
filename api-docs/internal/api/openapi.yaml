openapi: 3.1.0
info:
  title: Cortes API - App Platform
  description: |
    App platform endpoints for mobile clients.

    ## Authentication

    | Type | How |
    |---|---|
    | JWT Bearer token | `Authorization: Bearer <token>` header (required for most endpoints) |
    | Public (no auth) | Location, health, guest payments, feedback (API key protected) |
    | PIN login | POST to `/api/v1/auth/pin/login` |
    | OTP | Request via `/api/v1/auth/otp/request` |

    ## Response Format

    All endpoints return JSON wrapped in a response envelope:

    ```json
    {
      "header": {
        "server_time_ms": 1741535480,
        "process_time_ms": 5064,
        "request_id": "8ceb138a-375a-4118-9d47-035e824d6597"
      },
      "data": { ... }
    }
    ```

    ## Domains

    | Domain | Description |
    |---|---|
    | **Auth** | Login, OTP, PIN, token management |
    | **Loan** | Loan lifecycle, pricing, payments, pickup |
    | **Wallet** | Withdrawals, transactions, account inquiry |
    | **Gold** | Gold rewards, redemptions, transactions, prices |
    | **Point** | Point rewards, redemptions, transactions |
    | **PPOB** | Electricity, mobile prepaid, PDAM bill payment |
    | **Payment** | Payment links and verification |
    | **Branch** | Branch listing |
    | **Banner** | In-app banner promotions |
    | **Location** | Geographic location data |
    | **Mission** | Referral and mission rewards |
    | **Customer State** | User state and preferences |
    | **Pricing Engine** | Loan pricing calculations |
  version: 0.0.1
servers:
  - url: /
    description: Base URL
tags:
  - name: api-active-payments
    x-displayName: Active Payments
    description: Endpoints for retrieving active payment links and payment information.
  - name: api-admin-fee
    x-displayName: Admin Fee
    description: Administrative fee inquiries for wallet withdrawals and PPOB transactions.
  - name: api-assets
    x-displayName: Assets
    description: Collateral asset listing for the authenticated customer.
  - name: api-auth
    x-displayName: Auth
    description: Authentication endpoints including OTP, PIN login, token refresh, and user verification.
  - name: api-balance
    x-displayName: Balance
    description: Customer aggregated balance information (wallet, gold, points).
  - name: api-banner
    x-displayName: Banner
    description: In-app promotional banners.
  - name: api-branch
    x-displayName: Branch
    description: Branch listing and details.
  - name: api-customer-prospect
    x-displayName: Customer Prospect
    description: Customer prospect segment management.
  - name: api-customer-state
    x-displayName: Customer State
    description: Customer state tracking (TNC, notifications, first transaction timestamps).
  - name: api-feedback
    x-displayName: Feedback
    description: Customer feedback submission and retrieval.
  - name: api-gold-reward-prices
    x-displayName: Gold Reward Prices
    description: Gold reward price reference.
  - name: api-gold
    x-displayName: Gold
    description: Gold rewards, redemptions, prices, and transaction history.
  - name: api-health
    x-displayName: Health
    description: Service health check.
  - name: api-last-approved-cuan-emas
    x-displayName: Last Approved Cuan Emas
    description: Last approved gold mission data (Cuan Emas).
  - name: api-last-approved-cuan-pandai
    x-displayName: Last Approved Cuan Pandai
    description: Last approved point mission data (Cuan Pandai).
  - name: api-loan
    x-displayName: Loan
    description: Loan lifecycle including listing, detail, pricing calculation, payment links, and verification.
  - name: api-location
    x-displayName: Location
    description: Geographic location data (provinces, cities, districts, sub-districts).
  - name: api-mission
    x-displayName: Mission
    description: Mission and referral rewards.
  - name: api-payment
    x-displayName: Payment
    description: Payment information retrieval.
  - name: api-point
    x-displayName: Point
    description: Point rewards, redemptions, and transaction history.
  - name: api-ppob
    x-displayName: PPOB
    description: Payment Point Online Bank (electricity, mobile prepaid, PDAM bill payments).
  - name: api-pricing-engine
    x-displayName: Pricing Engine

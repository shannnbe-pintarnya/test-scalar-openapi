  /api/v3/loans/{sbg_code}/calculate:
    post:
      tags:
        - api-loan
      summary: Calculate loan pricing V3
      description: Calculate repayment amounts (V3 version) for a specific loan.
      operationId: post_api_v3_loans_param_calculate

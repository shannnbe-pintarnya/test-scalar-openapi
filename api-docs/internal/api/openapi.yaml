          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/loan_CalculateLoanPricingRequest'
      responses:
        "200":
          description: V3 loan pricing calculation result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CalculatePricingResponse'

  /api/v3/loans/{sbg_code}/payment:
    post:
      tags:
        - api-loan
      summary: Create customer payment link V3
      description: Generate a payment link (V3 version) for the customer to pay their loan.
      operationId: post_api_v3_loans_param_payment
      security:

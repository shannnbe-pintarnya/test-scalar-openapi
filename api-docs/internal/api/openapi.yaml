  # Wallet
  /api/v1/wallets/account-inquiry:
    post:
      tags:
        - api-wallet
      summary: Account inquiry
      description: Validate a bank account or e-wallet number before initiating a withdrawal.
      operationId: post_api_v1_wallets_account_inquiry
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/wallet_AccountInquiryRequest'
      responses:
        "200":
          description: Account inquiry result with account holder name and validation status.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/wallet_AccountInquiryResponse'

  /api/v1/wallets/withdraw:
    post:
      tags:
        - api-wallet
      summary: Withdraw funds
      description: Initiate a withdrawal from the customer's wallet to a bank account or e-wallet.
      operationId: post_api_v1_wallets_withdraw
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/wallet_WithdrawRequest'
      responses:
        "200":

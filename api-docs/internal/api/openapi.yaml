paths:
  # Auth
  /api/v1/auth/verify-phone:
    post:
      tags:
        - api-auth
      summary: Verify phone number
      description: Check if a phone number is registered in the system. Used as the first step of the authentication flow.
      operationId: post_api_v1_auth_verify_phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyPhoneRequest'
      responses:
        "200":
          description: Phone number verification result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyPhoneResponse'

  /api/v1/auth/otp/request:
    post:
      tags:
        - api-auth
      summary: Request OTP
      description: Request a one-time password to be sent via SMS or WhatsApp to the given phone number.
      operationId: post_api_v1_auth_otp_request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_RequestOTPRequest'
      responses:
        "200":
          description: OTP request result with last request timestamp.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_RequestOTPResponse'

  /api/v1/auth/otp/verify:
    post:
      tags:
        - api-auth
      summary: Verify OTP
      description: Verify the OTP code sent to the phone number. Returns access token and customer user ID on success.
      operationId: post_api_v1_auth_otp_verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyOTPRequest'
      responses:
        "200":
          description: OTP verification result with access token.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyOTPResponse'

  /api/v1/auth/pin/create:
    post:
      tags:
        - api-auth
      summary: Create PIN
      description: Create a 6-digit PIN for the authenticated user (requires OTP-verified token).
      operationId: post_api_v1_auth_pin_create
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_CreatePINRequest'
      responses:
        "200":
          description: PIN creation result with access token and phone registration status.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_CreatePINResponse'

  /api/v1/auth/pin/login:
    post:
      tags:
        - api-auth
      summary: Login with PIN
      description: Authenticate using phone number and PIN. Returns access token, refresh token, and customer details.
      operationId: post_api_v1_auth_pin_login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_LoginPINRequest'
      responses:
        "200":
          description: Login result with tokens and customer info.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_LoginPINResponse'

  /api/v1/auth/pin/reset:
    post:
      tags:
        - api-auth
      summary: Reset PIN
      description: Reset the user's PIN by providing the old and new PIN values. Requires authentication.
      operationId: post_api_v1_auth_pin_reset
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_ResetPINRequest'
      responses:
        "200":
          description: Token response after successful PIN reset.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_TokenResponse'

  /api/v1/auth/refresh:
    post:
      tags:
        - api-auth
      summary: Refresh access token
      description: Exchange a refresh token for a new access token and refresh token pair.
      operationId: post_api_v1_auth_refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_RefreshTokenRequest'
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_TokenResponse'

  /api/v1/auth/user/verify:
    post:
      tags:
        - api-auth
      summary: Verify user identity
      description: Verify user identity by providing NIK or CIF. Used after OTP verification to complete registration.
      operationId: post_api_v1_auth_user_verify
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyUserRequest'
      responses:
        "200":
          description: User verification result with token and customer details including gold reward info.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyUserResponse'

  /api/v1/auth/logout:
    post:
      tags:
        - api-auth
      summary: Logout
      description: Invalidate the current access token and log the user out.
      operationId: post_api_v1_auth_logout
      security:
        - JWTAuth: []
      responses:
        "200":
          description: Successful logout.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/httphelper_SuccessResponse'

  /api/v1/auth/info:
    get:
      tags:
        - api-auth
      summary: Get auth info
      description: Returns auth-related information for the authenticated user, such as whether verification is blocked.
      operationId: get_api_v1_auth_info
      security:
        - JWTAuth: []
      responses:
        "200":
          description: Auth info response.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_GetAuthInfoResponse'

  /api/v1/users:
    delete:
      tags:
        - api-user
      summary: Delete account
      description: Permanently delete the authenticated user's account. Requires verified authentication.
      operationId: delete_api_v1_users
      security:
        - JWTAuth: []
      responses:
        "200":
          description: Account deleted successfully.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/httphelper_SuccessResponse'

  /api/v2/auth/user/verify:
    post:
      tags:
        - api-auth
      summary: Verify user identity V2
      description: Verify user identity by providing NIK or CIF. Returns point reward info (V2 version of the endpoint).
      operationId: post_api_v2_auth_user_verify
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyUserRequest'
      responses:
        "200":
          description: User verification result with point reward details.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/auth_VerifyUserV2Response'

  # Loan - App
  /api/v1/loans:
    get:
      tags:
        - api-loan
      summary: Get customer loan list
      description: Returns a list of the authenticated customer's active and past loans with pagination.
      operationId: get_api_v1_loans
      security:
        - JWTAuth: []
      parameters:
        - name: filter_loan_status
          in: query
          required: false
          schema:
            type: string
          description: Filter by loan status (e.g. ACTIVE, COMPLETED).
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number for pagination.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
          description: Number of items per page.
      responses:
        "200":
          description: List of customer loans with pagination info.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_GetCustomerLoanListResponse'

  /api/v1/loans/{sbg_code}:
    get:
      tags:
        - api-loan
      summary: Get customer loan detail
      description: Returns detailed information about a specific loan identified by its SBG code.
      operationId: get_api_v1_loans_param
      security:
        - JWTAuth: []
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      responses:
        "200":
          description: Detailed loan information including items, transactions, and pickup status.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_GetCustomerLoanDetailResponse'

  /api/v1/loans/{sbg_code}/calculate:
    post:
      tags:
        - api-loan
      summary: Calculate loan pricing
      description: Calculate repayment amounts including cicil and other options for a specific loan.
      operationId: post_api_v1_loans_param_calculate
      security:
        - JWTAuth: []
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/loan_CalculateLoanPricingRequest'
      responses:
        "200":
          description: Loan pricing calculation result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CalculatePricingResponse'

  /api/v1/loans/{sbg_code}/payment:
    post:
      tags:
        - api-loan
      summary: Create customer payment link
      description: Generate a payment link for the customer to pay their loan. Supports various payment methods and promo codes.
      operationId: post_api_v1_loans_param_payment
      security:
        - JWTAuth: []
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/loan_CreatePaymentLinkRequest'
      responses:
        "200":
          description: Payment link created successfully.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CreatePaymentLinkResponse'
    delete:
      tags:
        - api-loan
      summary: Cancel customer payment
      description: Cancel an active payment link for the specified loan.
      operationId: delete_api_v1_loans_param_payment
      security:
        - JWTAuth: []
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      responses:
        "200":
          description: Payment cancelled successfully.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CancelCustomerPaymentResponse'

  /api/v1/loans/{sbg_code}/payment-verification:
    post:
      tags:
        - api-loan
      summary: Verify loan payment
      description: Check the payment status of a loan and return payment/repayment details, including pickup and reward information.
      operationId: post_api_v1_loans_param_payment_verification
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      responses:
        "200":
          description: Payment verification result with loan detail, items, pickup, and gold reward info.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_LoanPaymentVerificationResponse'

  /api/v1/loans/{sbg_code}/payment/guest:
    post:
      tags:
        - api-loan
      summary: Create guest payment link
      description: Generate a payment link for a loan without requiring authentication (guest payment).
      operationId: post_api_v1_loans_param_payment_guest
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      responses:
        "200":
          description: Guest payment link created.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CreatePaymentLinkResponse'

  /api/v2/loans/pickup-histories:
    get:
      tags:
        - api-loan
      summary: Get pickup histories
      description: Returns a list of loans with their collateral pickup history for the authenticated customer.
      operationId: get_api_v2_loans_pickup_histories
      security:
        - JWTAuth: []
      responses:
        "200":
          description: List of pickup histories with loan and collateral details.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_GetCollectedCollateral'

  /api/v2/loans/{sbg_code}/calculate:
    post:
      tags:
        - api-loan
      summary: Calculate loan pricing V2
      description: Calculate repayment amounts for a loan (V2 version with additional pricing options).
      operationId: post_api_v2_loans_param_calculate
      security:
        - JWTAuth: []
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/loan_CalculateLoanPricingRequest'
      responses:
        "200":
          description: V2 loan pricing calculation result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CalculatePricingResponse'

  /api/v2/loans/{sbg_code}/payment:
    post:
      tags:
        - api-loan
      summary: Create customer payment link V2
      description: Generate a payment link (V2 version) for the customer to pay their loan.
      operationId: post_api_v2_loans_param_payment
      security:
        - JWTAuth: []
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/loan_CreatePaymentLinkRequest'
      responses:
        "200":
          description: V2 payment link created.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CreatePaymentLinkResponse'

  /api/v2/loans/{sbg_code}/payment-verification:
    post:
      tags:
        - api-loan
      summary: Verify loan payment V2
      description: Check the payment status of a loan (V2 version) returning point reward info instead of gold reward.
      operationId: post_api_v2_loans_param_payment_verification
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      responses:
        "200":
          description: V2 payment verification with point reward details.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_LoanPaymentVerificationV2Response'

  /api/v2/loans/{sbg_code}/payment/guest:
    post:
      tags:
        - api-loan
      summary: Create guest payment link V2
      description: Generate a payment link for a loan without authentication (V2 guest payment).
      operationId: post_api_v2_loans_param_payment_guest
      parameters:
        - name: sbg_code
          in: path
          required: true
          schema:
            type: string
          description: The unique SBG loan code.
      responses:
        "200":
          description: V2 guest payment link created.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_CreatePaymentLinkResponse'

  /api/v3/loans/{sbg_code}:
    get:
      tags:
        - api-loan
      summary: Get customer loan detail V3
      description: Returns detailed loan information (V3 version) including transaction histories with point reward info.
      operationId: get_api_v3_loans_param
      security:
        - JWTAuth: []
      parameters:

  /landing/v1/appointments:
    get:
      tags:
        - landing-appointments
      summary: Get appointments
      description: Look up appointments by one or more booking codes. Returns appointment details including branch info, personal information, device details, and loan estimates.
      operationId: get_landing_v1_appointments
      parameters:
        - name: booking_code
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated booking codes to look up.
      responses:
        "200":
          description: Appointment details with branch, device info, and loan estimates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/landing_GetAppointmentsResponse'
    post:
      tags:
        - landing-appointments
      summary: Create appointment
      description: Book a new service appointment at a branch. Generates a unique booking code and returns appointment details along with loan estimates based on the device.
      operationId: post_landing_v1_appointments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/landing_CreateAppointmentRequest'
      responses:
        "200":
          description: Appointment created with booking code and loan estimates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/landing_CreateAppointmentResponse'

  /landing/v1/banners:
    get:
      tags:
        - landing-banner
      summary: Get banners
      description: Returns a list of active banners for the landing page, filtered by platform and category.
      operationId: get_landing_v1_banners
      parameters:
        - name: platform
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by target platform (e.g. landing).
        - name: category
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by banner category.
      responses:
        "200":
          description: List of active banners for the landing page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/banner_GetBannersResponse'

  /landing/v1/branches:
    get:
      tags:
        - landing-branch
      summary: Get branches
      description: Returns a list of active branches with location details. Supports search, geo-location filtering (lat/long), and pagination.
      operationId: get_landing_v1_branches
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search branches by name or address.
        - name: lat
          in: query
          required: false
          schema:
            type: string
          description: Latitude for geo-location filtering.
        - name: long
          in: query
          required: false
          schema:
            type: string
          description: Longitude for geo-location filtering.
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number for pagination.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
          description: Number of items per page.
      responses:
        "200":
          description: Paginated list of branches.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/branch_BranchesResponse'


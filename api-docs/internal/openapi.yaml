paths:
  # Auth
  /api/v1/auth/verify-phone:
    post:
      tags:
        - api-auth
      summary: Verify phone number
      description: Check if a phone number is registered in the system. Used as the first step of the authentication flow.
      operationId: post_api_v1_auth_verify_phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_VerifyPhoneRequest'
      responses:
        "200":
          description: Phone number verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_VerifyPhoneResponse'

  /api/v1/auth/otp/request:
    post:
      tags:
        - api-auth
      summary: Request OTP
      description: Request a one-time password to be sent via SMS or WhatsApp to the given phone number.
      operationId: post_api_v1_auth_otp_request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_RequestOTPRequest'
      responses:
        "200":
          description: OTP request result with last request timestamp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_RequestOTPResponse'

  /api/v1/auth/otp/verify:
    post:
      tags:
        - api-auth
      summary: Verify OTP
      description: Verify the OTP code sent to the phone number. Returns access token and customer user ID on success.
      operationId: post_api_v1_auth_otp_verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_VerifyOTPRequest'
      responses:
        "200":
          description: OTP verification result with access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_VerifyOTPResponse'

  /api/v1/auth/pin/create:
    post:
      tags:
        - api-auth
      summary: Create PIN
      description: Create a 6-digit PIN for the authenticated user (requires OTP-verified token).
      operationId: post_api_v1_auth_pin_create
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_CreatePINRequest'
      responses:
        "200":
          description: PIN creation result with access token and phone registration status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_CreatePINResponse'

  /api/v1/auth/pin/login:
    post:
      tags:
        - api-auth
      summary: Login with PIN
      description: Authenticate using phone number and PIN. Returns access token, refresh token, and customer details.
      operationId: post_api_v1_auth_pin_login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_LoginPINRequest'
      responses:
        "200":
          description: Login result with tokens and customer info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_LoginPINResponse'

  /api/v1/auth/pin/reset:
    post:
      tags:
        - api-auth
      summary: Reset PIN
      description: Reset the user's PIN by providing the old and new PIN values. Requires authentication.
      operationId: post_api_v1_auth_pin_reset
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_ResetPINRequest'
      responses:
        "200":
          description: Token response after successful PIN reset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_TokenResponse'

  /api/v1/auth/refresh:
    post:
      tags:
        - api-auth
      summary: Refresh access token
      description: Exchange a refresh token for a new access token and refresh token pair.
      operationId: post_api_v1_auth_refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_RefreshTokenRequest'
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_TokenResponse'

  /api/v1/auth/user/verify:
    post:
      tags:
        - api-auth
      summary: Verify user identity
      description: Verify user identity by providing NIK or CIF. Used after OTP verification to complete registration.
      operationId: post_api_v1_auth_user_verify
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_VerifyUserRequest'
      responses:
        "200":
          description: User verification result with token and customer details including gold reward info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_VerifyUserResponse'

  /api/v1/auth/logout:
    post:
      tags:
        - api-auth
      summary: Logout
      description: Invalidate the current access token and log the user out.
      operationId: post_api_v1_auth_logout
      security:
        - JWTAuth: []
      responses:
        "200":
          description: Successful logout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/httphelper_SuccessResponse'

  /api/v1/auth/info:
    get:
      tags:
        - api-auth
      summary: Get auth info
      description: Returns auth-related information for the authenticated user, such as whether verification is blocked.
      operationId: get_api_v1_auth_info
      security:
        - JWTAuth: []
      responses:
        "200":
          description: Auth info response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_GetAuthInfoResponse'

  /api/v1/users:
    delete:
      tags:
        - api-user
      summary: Delete account
      description: Permanently delete the authenticated user's account. Requires verified authentication.
      operationId: delete_api_v1_users
      security:
        - JWTAuth: []
      responses:
        "200":
          description: Account deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/httphelper_SuccessResponse'

  /api/v2/auth/user/verify:
    post:
      tags:
        - api-auth
      summary: Verify user identity V2
      description: Verify user identity by providing NIK or CIF. Returns point reward info (V2 version of the endpoint).
      operationId: post_api_v2_auth_user_verify
      security:

            type: integer
          description: Loan ID
      security:
        - IntoolsAuth: []
      responses:
        "200":
          description: V3 loan approval result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_LoanApprovalResponse'
  /intools/v1/loans/{id}:
    get:
      tags:
        - intools-loan
      summary: Get loan detail V1
      description: Returns comprehensive loan information including customer data, collateral items, inventory storage, transaction history, and simulasi gadai results.
      operationId: get_intools_v1_loans_id

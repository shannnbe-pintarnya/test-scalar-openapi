paths:
  /intools/v1/auth/login:
    post:
      tags:
        - intools-auth
      summary: Staff login
      description: Authenticate using email and password. Returns access token and user permissions.
      operationId: post_intools_v1_auth_login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/authintools_GetAccessUserRequest'
      responses:
        "200":
          description: Login result with access token, refresh token, and user permissions.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/authintools_GetAccessUserResponse'
  /intools/v1/auth/login/stg:
    post:
      tags:
        - intools-auth
      summary: Staging login
      description: Login to the staging environment using email and password bypassing normal auth.
      operationId: post_intools_v1_auth_login_stg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/authintools_LoginAuthStagingRequest'
      responses:
        "200":
          description: Staging login result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/authintools_GetAccessUserResponse'
  /intools/v2/auth/login:
    post:
      tags:
        - intools-auth
      summary: Staff login V2
      description: Authenticate using email and password (V2). Returns enhanced user permissions and role data.
      operationId: post_intools_v2_auth_login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/authintools_GetAccessUserRequest'
      responses:
        "200":
          description: V2 login result with user permissions.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/authintools_GetAccessUserResponseV2'
  /intools/v1/auth/refresh-token:
    post:
      tags:
        - intools-auth
      summary: Refresh access token
      description: Exchange a refresh token for a new access token and refresh token pair.
      operationId: post_intools_v1_auth_refresh-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/authintools_RefreshTokenRequest'
      responses:
        "200":
          description: New access token and refresh token.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/authintools_RefreshTokenResponse'
  /intools/v1/auth/logout:
    post:
      tags:
        - intools-auth
      summary: Logout
      description: Invalidate the current access token and end the session.
      operationId: post_intools_v1_auth_logout
      security:
        - IntoolsAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/authintools_LogoutRequest'
      responses:
        "200":
          description: Logout confirmation.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/authintools_LogoutResponse'
  /intools/v1/auth/validate-token:
    post:
      tags:
        - intools-auth
      summary: Validate token
      description: Check if the current access token is still valid.
      operationId: post_intools_v1_auth_validate-token
      security:
        - IntoolsAuth: []
      responses:
        "200":
          description: Token validation result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/httphelper_SuccessResponse'
  /intools/v1/auth/info:
    get:
      tags:
        - intools-auth
      summary: Get auth info
      description: Returns the authenticated user information including permissions and branch access.
      operationId: get_intools_v1_auth_info
      security:
        - IntoolsAuth: []
      responses:
        "200":
          description: User authentication info with roles and permissions.
          content:
            application/json:
              schema:

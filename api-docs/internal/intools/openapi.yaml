      summary: Change password
      description: Change the authenticated user password by providing the old and new passwords.
      operationId: post_intools_v1_auth_change-password
      security:
        - IntoolsAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/openapi.yaml#/components/schemas/authintools_ChangePasswordRequest'
      responses:
        "200":

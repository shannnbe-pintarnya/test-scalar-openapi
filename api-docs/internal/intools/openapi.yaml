  /intools/v1/loans/approval/{id}:
    post:
      tags:
        - intools-loan
      summary: Approve/reject loan V1
      description: Approve or reject a loan application by loan ID.
      operationId: post_intools_v1_loans_approval_id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Loan ID
      security:
        - IntoolsAuth: []
      responses:
        "200":
          description: Loan approval result.
          content:
            application/json:
              schema:
                $ref: '../model/openapi.yaml#/components/schemas/loan_LoanApprovalResponse'
  /intools/v2/loans/{id}/approval:
    post:
      tags:
        - intools-loan
      summary: Approve/reject loan V2
      description: Approve or reject a loan application (V2) with rejection category support.
      operationId: post_intools_v2_loans_id_approval
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Loan ID
      security:

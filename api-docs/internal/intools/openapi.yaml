openapi: 3.1.0
info:
  title: Cortes API - Intools Platform
  description: |
    Internal staff tools endpoints for back-office operations.

    ## Authentication

    | Type | How |
    |---|---|
    | IntoolsAuth (RBAC) | Session token with role-based permission checks per endpoint |
    | Scheduler auth | Internal scheduler service authentication |
    | API key (internal) | Select legacy endpoints protected by internal API key headers |

    ## Permissions

    Each endpoint requires specific permission constants (e.g., `LOANS_CREATE`, `CUSTOMERS`, `OFFLOAD_QC`).
    Users are assigned permissions via their role. The `menus` endpoint returns available features based on permissions.

    ## Domains

    | Domain | Description |
    |---|---|
    | **Auth** | Staff login, logout, token refresh, password change |
    | **Loan** | Loan creation, approval, listing, payment links, pickup management |
    | **Customer** | Customer CRUD, verification, referral codes, blacklist, balances |
    | **Banner** | Banner management with image upload |
    | **Branch** | Branch listing |
    | **Collateral** | Collateral item IMEI lookup and detail calculation |
    | **Offload** | Inventory offload, QC, stock opname, warehouse deliveries |
    | **Cash Management** | Cash flow tracking and reporting |
    | **Petty Cash** | Petty cash transactions and approvals |
    | **Stock Opname** | Inventory audit configuration and execution |
    | **Reporting** | Inventory reports, transaction reports, dashboards |
    | **Pricing Engine** | Loan pricing calculations |
    | **Price Reference** | Device price lookup and photo upload |
    | **Promos** | Promotion eligibility checks |
    | **Guest Book** | Walk-in visitor management |
    | **Print** | SBG, receipt, and plombir document generation |
    | **Metabase** | Business intelligence dashboard embedding |
    | **Talenta** | HR system integration |
    | **Event Scheduler** | Scheduled task execution (reminders, reward processing) |
  version: "0.0.1"

      description: Active payment link information for the customer.
      type: object
      required:
        - sbg_code
        - created_at
        - expired_at
        - payment_amount
        - status
      properties:
        sbg_code:
          type: string
          description: Loan code associated with the payment link. It prefixes with Branch ID followed by the Loan ID.
          examples:
            - 999999900002679
        created_at:
          type: string
          format: date-time
          description: Timestamp when the payment link was created (RFC3339).
          examples:
            - 2024-01-15T09:30:00Z
        expired_at:
          type: string
          format: date-time
          description: Timestamp when the payment link expires (RFC3339).
          examples:
            - 2024-01-16T09:30:00Z
        payment_amount:
          type: number
          description: Total amount to be paid.
          examples:
            - 1250000
        status:
          type: string
          description: Current status of the payment link.
          examples:
            - CREATED
            - EXPIRED
            - PAID
